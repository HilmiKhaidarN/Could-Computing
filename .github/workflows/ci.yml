name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegisops
          POSTGRES_PASSWORD: aegisops_test
          POSTGRES_DB: aegisops_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://aegisops:aegisops_test@localhost:5432/aegisops_test
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: backend
        run: npm run lint || echo "⚠️ Lint warnings found"

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://aegisops:aegisops_test@localhost:5432/aegisops_test
          JWT_SECRET: test_secret_ci
          ML_SERVICE_URL: http://localhost:8000
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: backend
        run: npm run build

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || echo "⚠️ Lint warnings found"

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: npm run build

  # ── ML Service ───────────────────────────────────────────────────────────────
  ml-service:
    name: ML Service (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        working-directory: ml-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ml-service
        run: python -m pytest tests/ -v --cov=. --cov-report=term-missing

      - name: Check app imports
        working-directory: ml-service
        run: python -c "from app import app; print('✅ App imports successfully')"

  # ── Summary ──────────────────────────────────────────────────────────────────
  ci-success:
    name: ✅ All CI Checks Passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, ml-service]
    if: success()
    
    steps:
      - name: Success
        run: |
          echo "🎉 All CI checks passed successfully!"
          echo "✅ Backend: Build & Test"
          echo "✅ Frontend: Build & Type Check"
          echo "✅ ML Service: Test"
