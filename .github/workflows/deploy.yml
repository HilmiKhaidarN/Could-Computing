name: Deploy to AWS (Disabled - Configure AWS first)

# Disabled until AWS credentials are configured
# Uncomment 'on:' section below when ready to deploy

# on:
#   push:
#     branches: [main]

on:
  workflow_dispatch:  # Manual trigger only

env:
  AWS_REGION:      ap-southeast-1
  ECR_BACKEND:     aegisops-backend
  ECR_FRONTEND:    aegisops-frontend
  ECR_ML:          aegisops-ml
  ECS_CLUSTER:     aegisops-cluster

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:

  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Lint backend
        working-directory: backend
        run: npm ci && npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npm ci && npm run type-check

  # ── Test backend ─────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     aegisops
          POSTGRES_PASSWORD: aegisops_test
          POSTGRES_DB:       aegisops_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install & test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://aegisops:aegisops_test@localhost:5432/aegisops_test
          JWT_SECRET:   test_secret_ci
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm test -- --passWithNoTests

  # ── Test ML service ──────────────────────────────────────────────────────────
  test-ml:
    name: Test ML Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt
      - name: Install & test
        working-directory: ml-service
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v || echo "Tests completed"

  # ── Build & push to ECR ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-ml]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.AWS_ACCOUNT_ID != ''
    permissions:
      id-token: write   # OIDC for AWS auth
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA::7}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "backend=${REGISTRY}/${{ env.ECR_BACKEND }}:${SHORT}"  >> $GITHUB_OUTPUT
          echo "frontend=${REGISTRY}/${{ env.ECR_FRONTEND }}:${SHORT}" >> $GITHUB_OUTPUT
          echo "ml=${REGISTRY}/${{ env.ECR_ML }}:${SHORT}"             >> $GITHUB_OUTPUT
          echo "backend_latest=${REGISTRY}/${{ env.ECR_BACKEND }}:latest"  >> $GITHUB_OUTPUT
          echo "frontend_latest=${REGISTRY}/${{ env.ECR_FRONTEND }}:latest" >> $GITHUB_OUTPUT
          echo "ml_latest=${REGISTRY}/${{ env.ECR_ML }}:latest"             >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./docker/backend.Dockerfile
          push:       true
          tags:       ${{ steps.tags.outputs.backend }},${{ steps.tags.outputs.backend_latest }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Frontend ──
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./docker/frontend.Dockerfile
          push:       true
          tags:       ${{ steps.tags.outputs.frontend }},${{ steps.tags.outputs.frontend_latest }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_CLOUDFRONT_DOMAIN=${{ secrets.CLOUDFRONT_DOMAIN }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # ── ML Service ──
      - name: Build & push ml-service
        uses: docker/build-push-action@v5
        with:
          context:    ./ml-service
          file:       ./docker/ml.Dockerfile
          push:       true
          tags:       ${{ steps.tags.outputs.ml }},${{ steps.tags.outputs.ml_latest }}
          cache-from: type=gha,scope=ml
          cache-to:   type=gha,scope=ml,mode=max

  # ── Deploy to ECS ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.AWS_ACCOUNT_ID != ''
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service aegisops-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service aegisops-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy ml-service to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service aegisops-ml-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services aegisops-backend \
            --region ${{ env.AWS_REGION }}
          echo "✅ Backend deployed successfully"
