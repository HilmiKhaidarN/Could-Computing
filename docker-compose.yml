version: "3.9"

# =============================================================================
# AegisOps — Docker Compose
# Local development & staging. Production uses AWS ECS task definitions.
# =============================================================================

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aegisops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DATABASE_USER:-aegisops}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-aegisops_password}
      POSTGRES_DB:       ${DATABASE_NAME:-aegisops_db}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-aegisops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegisops-net

  # ─── Backend (NestJS) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend          # build context = backend/ folder
      dockerfile: ../docker/backend.Dockerfile
    image: aegisops-backend:local
    container_name: aegisops-backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV:     production
      PORT:         3000
      DATABASE_URL: postgresql://${DATABASE_USER:-aegisops}:${DATABASE_PASSWORD:-aegisops_password}@postgres:5432/${DATABASE_NAME:-aegisops_db}
      JWT_SECRET:   ${JWT_SECRET:-change_me_in_production}
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "${BACKEND_PORT:-4000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    # Run migrations then start server
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    networks:
      - aegisops-net

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend         # build context = frontend/ folder
      dockerfile: ../docker/frontend.Dockerfile
      args:
        # Baked into the Next.js bundle at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    image: aegisops-frontend:local
    container_name: aegisops-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT:     3000
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - aegisops-net

  # ─── ML Service (FastAPI) ───────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service       # build context = ml-service/ folder
      dockerfile: ../docker/ml.Dockerfile
    image: aegisops-ml:local
    container_name: aegisops-ml
    restart: unless-stopped
    environment:
      PORT:                8000
      PYTHONUNBUFFERED:    "1"
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aegisops-net

volumes:
  postgres_data:

networks:
  aegisops-net:
    driver: bridge
